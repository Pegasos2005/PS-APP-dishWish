<div class="principal-container">
  <header class="head">
    <button class="return-button" routerLink="/admin/dashboard">&lt;</button>
    <img src="assets/logo.png" alt="Restaurant Logo">
  </header>

  <div class="body-admin">
    <div class="sub-header">Admin - Product Management</div>

    <main class="content-area">
      <div class="admin-toolbar">
        <input type="text" class="search-field" placeholder="🔍 Search...">
        <button class="add-btn" (click)="addProduct()">+ Add Product</button>
      </div>

      <div class="grid-comandas">
        @for (product of products(); track product.id) {
        <section class="comanda-card">
          <div class="product-row">
            <span class="product-name"><strong>{{ product.name }}</strong></span>
            <span class="product-price">{{ product.price }}€</span>
            <div class="actions">
              <button class="btn-modify" (click)="editProduct(product)">Modify</button>
              <button class="btn-delete" (click)="deleteProduct(product)">Delete</button>
            </div>
          </div>
        </section>
        }
      </div>
    </main>
  </div>
</div>
